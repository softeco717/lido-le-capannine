<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lido Le Capannine — Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Header (sticky, visibile su tutti i breakpoint) -->
  <div class="menu-header" id="menuHeader">
    <button class="menu-back-btn" onclick="history.back()">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <div class="menu-header-info">
      <div class="menu-header-name">
        <img src="images/lido-logo-circle.png" alt="Logo" style="width:28px;height:28px;border-radius:50%;display:inline-block;vertical-align:middle;margin-right:6px;" />
        Lido Le Capannine
      </div>
      <div class="menu-header-location" id="locationLabel">Ombrellone 1</div>
    </div>
    <div class="menu-header-right">
      <div class="lang-switcher" style="position:static;box-shadow:none;background:transparent;">
        <button class="lang-btn active" onclick="setLang('it')">IT</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
      </div>
      <button class="cart-btn" onclick="openCart()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
        <span class="cart-badge" id="cartBadge">0</span>
      </button>
    </div>
  </div>

  <!-- Search bar (mobile + tablet) -->
  <div class="search-bar" id="searchBarMobile">
    <input type="text" class="search-input" id="searchInput" placeholder="Cerca nel menu..." oninput="filterProducts()" />
  </div>

  <!-- Categories bar (mobile + tablet scroll orizzontale) -->
  <div class="categories-bar" id="categoriesBar"></div>

  <!-- Layout desktop: sidebar + contenuto principale -->
  <div class="menu-page-desktop" id="menuPageDesktop">

    <!-- Sidebar categorie (visibile solo su desktop via CSS) -->
    <div class="menu-sidebar" id="menuSidebar">
      <div style="padding:12px 20px 8px;font-size:11px;font-weight:700;color:#aaa;letter-spacing:0.08em;text-transform:uppercase;">Categorie</div>
      <div id="sidebarCategories"></div>
      <div style="padding:16px 20px 0;border-top:1px solid #f0e8d8;margin-top:12px;">
        <input type="text" class="search-input" id="searchInputDesktop" placeholder="Cerca..." oninput="filterProductsDesktop()" style="font-size:13px;padding:8px 12px;" />
      </div>
    </div>

    <!-- Contenuto principale menu -->
    <div class="menu-main-content" id="menuMainContent">
      <div class="menu-list" id="menuList"></div>
    </div>

  </div>

  <!-- Cart Modal -->
  <div class="modal-overlay" id="cartModal" onclick="closeCartOutside(event)">
    <div class="modal-sheet">
      <div class="modal-title">
        <span id="cartTitle" data-it="Carrello" data-en="Cart">Carrello</span>
        <button class="modal-close" onclick="closeCart()">✕</button>
      </div>
      <div id="cartContent"></div>
      <div id="orderSuccess" class="order-success">
        <div class="success-icon">🎉</div>
        <div class="success-title" data-it="Ordine inviato!" data-en="Order sent!">Ordine inviato!</div>
        <div class="success-desc" data-it="Il tuo ordine è stato ricevuto. Ti portiamo tutto al più presto!" data-en="Your order has been received. We'll bring everything as soon as possible!">Il tuo ordine è stato ricevuto. Ti portiamo tutto al più presto!</div>
        <br/>
        <button class="btn-order" onclick="closeCart()" style="margin-top:16px;" data-it="Torna al menu" data-en="Back to menu">Torna al menu</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="js/supabase.js"></script>
  <script src="js/data.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/lang.js"></script>

  <script>
    // Sidebar desktop: sincronizza con categoriesBar
    function renderSidebarCategories() {
      const sidebar = document.getElementById('sidebarCategories');
      if (!sidebar || !menuCategories.length) return;
      const allLabel = currentLang === 'it' ? 'Tutti' : 'All';
      let html = `<button class="cat-btn ${currentCategory === 'all' ? 'active' : ''}" onclick="selectCategory('all')">${allLabel}</button>`;
      menuCategories.forEach(cat => {
        const name = currentLang === 'it' ? cat.name_it : cat.name_en;
        html += `<button class="cat-btn ${currentCategory === cat.id ? 'active' : ''}" onclick="selectCategory('${cat.id}')">${cat.icon || ''} ${name}</button>`;
      });
      sidebar.innerHTML = html;
    }

    function filterProductsDesktop() {
      const term = document.getElementById('searchInputDesktop').value;
      document.getElementById('searchInput').value = term;
      renderProducts(term);
    }

    // Aggiorna sidebar dopo ogni render categorie (senza override che causa loop)
    document.addEventListener('categoriesRendered', renderSidebarCategories);

    // Aggiusta altezza menu-page-desktop in base all'header
    function adjustDesktopLayout() {
      const header = document.getElementById('menuHeader');
      const desktop = document.getElementById('menuPageDesktop');
      if (header && desktop) {
        const h = header.offsetHeight;
        desktop.style.marginTop = '0';
        // Sidebar sticky top
        const sidebar = document.getElementById('menuSidebar');
        if (sidebar) sidebar.style.top = h + 'px';
      }
    }
    window.addEventListener('resize', adjustDesktopLayout);
    document.addEventListener('DOMContentLoaded', () => setTimeout(adjustDesktopLayout, 200));
  </script>
</body>
</html>
